name: Next.js CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_MAIN_API: ${{ secrets.NEXT_PUBLIC_MAIN_API }}
      NEXT_PUBLIC_CHATBOT_API: ${{ secrets.NEXT_PUBLIC_CHATBOT_API }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build